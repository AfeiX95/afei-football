<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿飞·赛博聊球 - 头像设计</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0a0a0f;
    font-family: 'Noto Sans SC', sans-serif;
    gap: 40px;
    padding: 40px;
  }

  /* ========== 方案A：足球+数据网格 ========== */
  .avatar-a {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #0d0d1a, #000000 80%);
    border: 2px solid rgba(0, 255, 255, 0.3);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.15), inset 0 0 60px rgba(0, 255, 255, 0.05);
  }

  /* 网格线 */
  .avatar-a .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 255, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 255, 0.06) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  /* 足球 */
  .avatar-a .ball {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a1a2e, #000000);
    border: 2px solid rgba(0, 255, 255, 0.5);
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), inset 0 0 30px rgba(0, 255, 255, 0.05);
  }

  .avatar-a .ball .hex {
    position: absolute;
    border: 1.5px solid rgba(0, 255, 255, 0.3);
    border-radius: 50%;
  }

  .avatar-a .ball .hex:nth-child(1) {
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 50px; height: 50px;
    border-color: rgba(0, 255, 255, 0.4);
  }
  .avatar-a .ball .hex:nth-child(2) {
    top: 25%; left: 30%;
    width: 35px; height: 35px;
  }
  .avatar-a .ball .hex:nth-child(3) {
    top: 55%; left: 15%;
    width: 30px; height: 30px;
  }
  .avatar-a .ball .hex:nth-child(4) {
    top: 20%; left: 60%;
    width: 28px; height: 28px;
  }
  .avatar-a .ball .hex:nth-child(5) {
    top: 60%; left: 65%;
    width: 32px; height: 32px;
  }
  .avatar-a .ball .hex:nth-child(6) {
    top: 40%; left: 75%;
    width: 25px; height: 25px;
  }

  /* 旋转光环 */
  .avatar-a .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 1px solid rgba(0, 255, 255, 0.1);
    animation: spin 8s linear infinite;
  }

  .avatar-a .ring::after {
    content: '';
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 4px;
    background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.6), transparent);
    border-radius: 50%;
  }

  /* 数据流 */
  .avatar-a .data-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
    animation: dataFlow 3s linear infinite;
  }

  .avatar-a .data-line:nth-child(4) { top: 20%; left: 10%; width: 80px; animation-delay: 0s; }
  .avatar-a .data-line:nth-child(5) { top: 75%; left: 5%; width: 100px; animation-delay: 1s; }
  .avatar-a .data-line:nth-child(6) { top: 85%; left: 60%; width: 70px; animation-delay: 0.5s; }

  /* 小标签 */
  .avatar-a .tag {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    color: rgba(0, 255, 255, 0.4);
    letter-spacing: 2px;
  }

  .avatar-a .tag.t1 { top: 12%; right: 15%; }
  .avatar-a .tag.t2 { bottom: 15%; left: 10%; }
  .avatar-a .tag.t3 { bottom: 8%; right: 12%; font-size: 6px; color: rgba(0, 255, 255, 0.25); }

  /* 角落扫描线效果 */
  .avatar-a .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: rgba(0, 255, 255, 0.2);
    border-style: solid;
  }
  .avatar-a .corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .avatar-a .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .avatar-a .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .avatar-a .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  /* ========== 方案B：A字体 + 赛博线条 ========== */
  .avatar-b {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle at 70% 30%, #0a0a1a, #000000);
    border: 2px solid rgba(255, 0, 128, 0.3);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255, 0, 128, 0.15), inset 0 0 60px rgba(255, 0, 128, 0.05);
  }

  .avatar-b .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 0, 128, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 0, 128, 0.05) 1px, transparent 1px);
    background-size: 15px 15px;
  }

  .avatar-b .letter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 120px;
    font-weight: 900;
    color: transparent;
    -webkit-text-stroke: 3px rgba(255, 0, 128, 0.7);
    text-shadow:
      0 0 30px rgba(255, 0, 128, 0.3),
      0 0 60px rgba(255, 0, 128, 0.1);
    letter-spacing: -5px;
  }

  .avatar-b .letter::after {
    content: '⚽';
    position: absolute;
    font-size: 25px;
    bottom: 15px;
    right: -30px;
    -webkit-text-stroke: 0;
    filter: drop-shadow(0 0 5px rgba(255, 0, 128, 0.5));
  }

  .avatar-b .circuit {
    position: absolute;
    border: 1px solid rgba(255, 0, 128, 0.15);
  }

  .avatar-b .circuit:nth-child(3) {
    top: 20%; left: 20%; width: 60%; height: 1px;
    border: none;
    background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.3), transparent);
  }
  .avatar-b .circuit:nth-child(4) {
    bottom: 25%; left: 15%; width: 70%; height: 1px;
    border: none;
    background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.2), transparent);
  }

  .avatar-b .dot {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255, 0, 128, 0.5);
    box-shadow: 0 0 10px rgba(255, 0, 128, 0.3);
  }
  .avatar-b .dot:nth-child(5) { top: 20%; left: 20%; }
  .avatar-b .dot:nth-child(6) { top: 20%; right: 20%; }
  .avatar-b .dot:nth-child(7) { bottom: 25%; left: 15%; }
  .avatar-b .dot:nth-child(8) { bottom: 25%; right: 15%; }

  /* 紫色版本 - 方案C */
  .avatar-c {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #0d0b1a, #000000);
    border: 2px solid rgba(120, 80, 255, 0.3);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(120, 80, 255, 0.15), inset 0 0 60px rgba(120, 80, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .avatar-c .glow {
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120, 80, 255, 0.08), transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }

  .avatar-c .text-main {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 20px rgba(120, 80, 255, 0.5);
    z-index: 1;
    letter-spacing: 4px;
  }

  .avatar-c .text-sub {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px;
    color: rgba(180, 160, 255, 0.6);
    margin-top: 8px;
    letter-spacing: 3px;
    z-index: 1;
  }

  .avatar-c .scanline {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(120, 80, 255, 0.02) 2px,
      rgba(120, 80, 254, 0.02) 4px
    );
  }

  /* ========== 标签 ========== */
  .label {
    color: rgba(255, 255, 255, 0.7);
    font-size: 14px;
    text-align: center;
    margin-top: 12px;
    letter-spacing: 2px;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .row {
    display: flex;
    gap: 80px;
    flex-wrap: wrap;
    justify-content: center;
  }

  h1 {
    color: #fff;
    font-size: 32px;
    font-family: 'Noto Sans SC', sans-serif;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
  }

  .subtitle {
    color: rgba(255, 255, 255, 0.4);
    font-size: 14px;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  /* ========== 动画 ========== */
  @keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  @keyframes dataFlow {
    0% { opacity: 0; transform: translateX(-20px); }
    50% { opacity: 1; }
    100% { opacity: 0; transform: translateX(20px); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(0.8); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  /* 推荐标记 */
  .recommend {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #00ffff;
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 1px;
    font-family: 'Orbitron', sans-serif;
  }

  .card { position: relative; }

  .desc {
    max-width: 280px;
    color: rgba(255, 255, 255, 0.5);
    font-size: 12px;
    text-align: center;
    line-height: 1.8;
    margin-top: 8px;
  }
</style>
</head>
<body>

  <h1>⚡ 阿飞·赛博聊球 头像设计</h1>
  <p class="subtitle">三个方案，看看哪个更对你味</p>

  <div class="row">

    <!-- 方案A -->
    <div class="card">
      <div class="recommend">推荐</div>
      <div class="avatar-a">
        <div class="grid"></div>
        <div class="ball">
          <div class="hex"></div>
          <div class="hex"></div>
          <div class="hex"></div>
          <div class="hex"></div>
          <div class="hex"></div>
          <div class="hex"></div>
        </div>
        <div class="ring"></div>
        <div class="data-line"></div>
        <div class="data-line"></div>
        <div class="data-line"></div>
        <div class="tag t1">SYSTEM</div>
        <div class="tag t2">DATA</div>
        <div class="tag t3">FOOTBALL.exe</div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
      <div class="label">方案A · 青蓝⚽赛博足球</div>
      <div class="desc">霓虹青蓝主色调，足球+数据网格+旋转光环<br>像个来自未来的足球分析系统</div>
    </div>

    <!-- 方案B -->
    <div class="card">
      <div class="avatar-b">
        <div class="grid"></div>
        <div class="letter">A</div>
        <div class="circuit"></div>
        <div class="circuit"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="label">方案B · 紫红⚡A字标识</div>
      <div class="desc">紫红霓虹，大写A字做主视觉<br>极简但有冲击力，像电竞Logo</div>
    </div>

    <!-- 方案C -->
    <div class="card">
      <div class="avatar-c">
        <div class="glow"></div>
        <div class="scanline"></div>
        <div class="text-main">⚽</div>
        <div class="text-sub">DATA ANALYST</div>
      </div>
      <div class="label">方案C · 紫色✨极简赛博</div>
      <div class="desc">紫调小清新赛博，足球+扫描线<br>简约有质感，不张扬但也有辨识度</div>
    </div>

  </div>

  <div style="color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 20px;">
    配色、字体、元素都可以再调，选个方向咱们继续细化
  </div>

</body>
</html>
