<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿飞·赛博聊球 - 头像设计 紫红版</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0a0a0f;
    font-family: 'Noto Sans SC', sans-serif;
    gap: 40px;
    padding: 40px;
  }

  .preview-container {
    display: flex;
    gap: 60px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }

  /* ========== 头像（圆形版本 - 最终效果） ========== */
  .avatar {
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #1a0a1a, #0a0008 80%);
    border: 2px solid rgba(200, 0, 255, 0.25);
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 60px rgba(200, 0, 255, 0.12),
      0 0 120px rgba(200, 0, 255, 0.06),
      inset 0 0 80px rgba(200, 0, 255, 0.04);
    flex-shrink: 0;
  }

  /* 网格 */
  .avatar .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200, 0, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200, 0, 255, 0.05) 1px, transparent 1px);
    background-size: 18px 18px;
  }

  /* 外圈旋转光环 */
  .avatar .ring-outer {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 1px solid rgba(200, 0, 255, 0.12);
    animation: spin 12s linear infinite;
  }
  .avatar .ring-outer::after {
    content: '';
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(200, 0, 255, 0.5), transparent);
    border-radius: 50%;
  }

  /* 内圈旋转光环（反方向） */
  .avatar .ring-inner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 1px solid rgba(255, 0, 128, 0.1);
    animation: spin-reverse 8s linear infinite;
  }
  .avatar .ring-inner::after {
    content: '';
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 25px;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.4), transparent);
    border-radius: 50%;
  }

  /* 足球 */
  .avatar .ball {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2a0a2a, #0d000d);
    border: 2px solid rgba(200, 0, 255, 0.4);
    box-shadow:
      0 0 40px rgba(200, 0, 255, 0.15),
      0 0 80px rgba(255, 0, 128, 0.08),
      inset 0 0 40px rgba(200, 0, 255, 0.05);
    z-index: 2;
  }

  /* 足球五边形纹路 */
  .avatar .ball .pentagon {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(200, 0, 255, 0.25);
  }
  .avatar .ball .pentagon:nth-child(1) {
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 50px; height: 50px;
    border-color: rgba(200, 0, 255, 0.35);
  }
  .avatar .ball .pentagon:nth-child(2) {
    top: 22%; left: 28%;
    width: 32px; height: 32px;
  }
  .avatar .ball .pentagon:nth-child(3) {
    top: 58%; left: 12%;
    width: 28px; height: 28px;
  }
  .avatar .ball .pentagon:nth-child(4) {
    top: 18%; left: 62%;
    width: 30px; height: 30px;
  }
  .avatar .ball .pentagon:nth-child(5) {
    top: 62%; left: 68%;
    width: 28px; height: 28px;
  }
  .avatar .ball .pentagon:nth-child(6) {
    top: 40%; left: 78%;
    width: 24px; height: 24px;
  }

  /* 足球内发光点 */
  .avatar .ball .core {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200, 0, 255, 0.4), transparent);
    box-shadow: 0 0 20px rgba(200, 0, 255, 0.2);
  }

  /* 数据流线条 */
  .avatar .data-line {
    position: absolute;
    height: 1px;
    border-radius: 50%;
    z-index: 3;
  }
  .avatar .data-line:nth-child(5) {
    top: 18%; left: 5%;
    width: 90px;
    background: linear-gradient(90deg, transparent, rgba(200, 0, 255, 0.25), transparent);
    animation: dataFlow 3s ease-in-out infinite;
  }
  .avatar .data-line:nth-child(6) {
    top: 78%; left: 3%;
    width: 110px;
    background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.2), transparent);
    animation: dataFlow 3.5s ease-in-out infinite 0.8s;
  }
  .avatar .data-line:nth-child(7) {
    top: 88%; left: 55%;
    width: 80px;
    background: linear-gradient(90deg, transparent, rgba(200, 0, 255, 0.2), transparent);
    animation: dataFlow 2.8s ease-in-out infinite 1.5s;
  }
  .avatar .data-line:nth-child(8) {
    top: 10%; left: 55%;
    width: 70px;
    background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.15), transparent);
    animation: dataFlow 4s ease-in-out infinite 2s;
  }

  /* 小标签 */
  .avatar .tag {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 2px;
    z-index: 3;
  }
  .avatar .tag.t1 {
    top: 10%; left: 18%;
    color: rgba(200, 0, 255, 0.35);
  }
  .avatar .tag.t2 {
    bottom: 12%; right: 14%;
    color: rgba(200, 0, 255, 0.3);
  }
  .avatar .tag.t3 {
    bottom: 6%; left: 12%;
    color: rgba(255, 0, 128, 0.2);
    font-size: 6px;
  }
  .avatar .tag.t4 {
    top: 14%; right: 16%;
    color: rgba(200, 0, 255, 0.25);
    font-size: 7px;
  }

  /* 角标 */
  .avatar .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: rgba(200, 0, 255, 0.15);
    border-style: solid;
    z-index: 1;
  }
  .avatar .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .avatar .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .avatar .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .avatar .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  /* 紫红光晕 */
  .avatar .glow-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200, 0, 255, 0.04), transparent 70%);
    animation: pulse 4s ease-in-out infinite;
  }

  /* ========== 正方形版本（头像原图，方便裁剪） ========== */
  .avatar-square {
    width: 360px;
    height: 360px;
    background: radial-gradient(circle at 30% 30%, #1a0a1a, #0a0008 80%);
    border: 2px solid rgba(200, 0, 255, 0.25);
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 60px rgba(200, 0, 255, 0.12),
      0 0 120px rgba(200, 0, 255, 0.06);
    flex-shrink: 0;
  }
  .avatar-square .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200, 0, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200, 0, 255, 0.05) 1px, transparent 1px);
    background-size: 18px 18px;
  }
  .avatar-square .glow-bg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200, 0, 255, 0.04), transparent 70%);
    animation: pulse 4s ease-in-out infinite;
  }
  .avatar-square .ring-outer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 280px; height: 280px;
    border-radius: 50%;
    border: 1px solid rgba(200, 0, 255, 0.12);
    animation: spin 12s linear infinite;
  }
  .avatar-square .ring-outer::after {
    content: '';
    position: absolute;
    top: -2px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(200, 0, 255, 0.5), transparent);
  }
  .avatar-square .ring-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 1px solid rgba(255, 0, 128, 0.1);
    animation: spin-reverse 8s linear infinite;
  }
  .avatar-square .ring-inner::after {
    content: '';
    position: absolute;
    top: -2px; left: 50%;
    transform: translateX(-50%);
    width: 25px; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.4), transparent);
  }
  .avatar-square .ball {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 130px; height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2a0a2a, #0d000d);
    border: 2px solid rgba(200, 0, 255, 0.4);
    box-shadow: 0 0 40px rgba(200, 0, 255, 0.15), 0 0 80px rgba(255, 0, 128, 0.08), inset 0 0 40px rgba(200, 0, 255, 0.05);
    z-index: 2;
  }
  .avatar-square .ball .pentagon {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(200, 0, 255, 0.25);
  }
  .avatar-square .ball .pentagon:nth-child(1) { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border-color: rgba(200, 0, 255, 0.35); }
  .avatar-square .ball .pentagon:nth-child(2) { top: 22%; left: 28%; width: 32px; height: 32px; }
  .avatar-square .ball .pentagon:nth-child(3) { top: 58%; left: 12%; width: 28px; height: 28px; }
  .avatar-square .ball .pentagon:nth-child(4) { top: 18%; left: 62%; width: 30px; height: 30px; }
  .avatar-square .ball .pentagon:nth-child(5) { top: 62%; left: 68%; width: 28px; height: 28px; }
  .avatar-square .ball .pentagon:nth-child(6) { top: 40%; left: 78%; width: 24px; height: 24px; }
  .avatar-square .ball .core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200, 0, 255, 0.4), transparent);
    box-shadow: 0 0 20px rgba(200, 0, 255, 0.2);
  }
  .avatar-square .data-line {
    position: absolute;
    height: 1px;
    z-index: 3;
  }
  .avatar-square .data-line:nth-child(6) { top: 18%; left: 5%; width: 90px; background: linear-gradient(90deg, transparent, rgba(200, 0, 255, 0.25), transparent); animation: dataFlow 3s ease-in-out infinite; }
  .avatar-square .data-line:nth-child(7) { top: 78%; left: 3%; width: 110px; background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.2), transparent); animation: dataFlow 3.5s ease-in-out infinite 0.8s; }
  .avatar-square .data-line:nth-child(8) { top: 88%; left: 55%; width: 80px; background: linear-gradient(90deg, transparent, rgba(200, 0, 255, 0.2), transparent); animation: dataFlow 2.8s ease-in-out infinite 1.5s; }
  .avatar-square .data-line:nth-child(9) { top: 10%; left: 55%; width: 70px; background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.15), transparent); animation: dataFlow 4s ease-in-out infinite 2s; }
  .avatar-square .tag {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 2px;
    z-index: 3;
  }
  .avatar-square .tag.t1 { top: 10%; left: 18%; color: rgba(200, 0, 255, 0.35); }
  .avatar-square .tag.t2 { bottom: 12%; right: 14%; color: rgba(200, 0, 255, 0.3); }
  .avatar-square .tag.t3 { bottom: 6%; left: 12%; color: rgba(255, 0, 128, 0.2); font-size: 6px; }
  .avatar-square .tag.t4 { top: 14%; right: 16%; color: rgba(200, 0, 255, 0.25); font-size: 7px; }
  .avatar-square .corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: rgba(200, 0, 255, 0.15);
    border-style: solid;
    z-index: 1;
  }
  .avatar-square .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .avatar-square .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .avatar-square .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .avatar-square .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  /* ========== 标签 ========== */
  .label {
    color: rgba(255, 255, 255, 0.7);
    font-size: 14px;
    text-align: center;
    margin-top: 16px;
    letter-spacing: 2px;
  }
  .label .hint {
    color: rgba(255, 255, 255, 0.3);
    font-size: 11px;
    margin-top: 6px;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    color: #fff;
    font-size: 28px;
    font-family: 'Noto Sans SC', sans-serif;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(200, 0, 255, 0.2);
  }

  .subtitle {
    color: rgba(255, 255, 255, 0.4);
    font-size: 14px;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  /* ========== 动画 ========== */
  @keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }
  @keyframes spin-reverse {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(-360deg); }
  }
  @keyframes dataFlow {
    0% { opacity: 0; transform: translateX(-15px); }
    40% { opacity: 1; }
    60% { opacity: 1; }
    100% { opacity: 0; transform: translateX(15px); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .desc {
    max-width: 340px;
    color: rgba(255, 255, 255, 0.45);
    font-size: 12px;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>

  <h1>阿飞·赛博聊球 头像设计</h1>
  <p class="subtitle">紫红赛博 · 方案A改</p>

  <div class="preview-container">

    <!-- 圆形版本 -->
    <div class="card">
      <div class="avatar">
        <div class="glow-bg"></div>
        <div class="grid"></div>
        <div class="ring-outer"></div>
        <div class="ring-inner"></div>
        <div class="ball">
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="core"></div>
        </div>
        <div class="data-line"></div>
        <div class="data-line"></div>
        <div class="data-line"></div>
        <div class="data-line"></div>
        <div class="tag t1">INIT</div>
        <div class="tag t2">DATA</div>
        <div class="tag t3">FOOTBALL.exe</div>
        <div class="tag t4">SCAN</div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
      <div class="label">● 圆形版（直接截图上传头条）</div>
      <div class="desc">紫红主色调 + 霓虹足球 + 双环扫描 + 数据流<br>截图保存即可作为头像使用</div>
    </div>

    <!-- 正方形版本 -->
    <div class="card">
      <div class="avatar-square">
        <div class="glow-bg"></div>
        <div class="grid"></div>
        <div class="ring-outer"></div>
        <div class="ring-inner"></div>
        <div class="ball">
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="pentagon"></div>
          <div class="core"></div>
        </div>
        <div class="data-line"></div>
        <div class="data-line"></div>
        <div class="data-line"></div>
        <div class="data-line"></div>
        <div class="tag t1">INIT</div>
        <div class="tag t2">DATA</div>
        <div class="tag t3">FOOTBALL.exe</div>
        <div class="tag t4">SCAN</div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
      <div class="label">■ 方形版（上传时的原图）</div>
      <div class="desc">一样的元素，方形画布<br>上传头条会自动裁圆，留方形原图备用</div>
    </div>

  </div>

  <div style="color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 10px; text-align: center; line-height: 2;">
    配色、标签文字、亮度都可以再调 · 截图后用手机/电脑上传头像即可
  </div>

</body>
</html>
