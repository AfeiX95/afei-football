<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;background:#0a0a0f;
  font-family:'Noto Sans SC','Segoe UI',sans-serif;padding:20px;
}

.card{
  width:800px;height:450px;
  position:relative;overflow:hidden;
  perspective:1200px;
  transform-style:preserve-3d;
}

/* 背景层 */
.bg-layer{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,#1a0a2a,#080008);
  border:1px solid rgba(180,0,255,0.15);
  box-shadow:0 0 80px rgba(180,0,255,0.06);
  transform:rotateX(2deg) scale(1.02);
  border-radius:4px;
}
.bg-layer::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(180,0,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(180,0,255,0.04) 1px,transparent 1px);
  background-size:25px 25px;
  transform:rotateX(5deg);
}

/* 中景装饰 */
.mid-layer{z-index:0;position:absolute;inset:-20px;transform:translateZ(-40px) rotateX(1deg);opacity:0.5;}
.mid-ring{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:400px;height:400px;border-radius:50%;
  border:1px solid rgba(180,0,255,0.06);
}
.mid-ring2{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:530px;height:530px;border-radius:50%;
  border:1px solid rgba(180,0,255,0.035);
}

/* 顶端栏 */
.topbar{
  position:absolute;top:0;left:0;right:0;
  padding:14px 28px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;transform:translateZ(20px);
  border-bottom:1px solid rgba(180,0,255,0.1);
}
.topbar .tag{
  font-size:12px;color:rgba(180,0,255,0.4);
  letter-spacing:2.5px;font-family:'Orbitron',sans-serif;
}
.topbar .tag span{color:rgba(180,0,255,0.6);}

/* 主容器 */
.vs-container{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  gap:20px;z-index:5;transform:translateZ(10px);
}

/* 球队 */
.team{text-align:center;}
.team-left{transform:translateZ(20px) translateX(10px);}
.team-right{transform:translateZ(20px) translateX(-10px);}

/* 队徽 */
.badge{
  width:120px;height:120px;
  margin:0 auto 16px;
  filter:drop-shadow(0 0 20px rgba(180,0,255,0.2));
  display:flex;align-items:center;justify-content:center;
}
.badge img, .badge svg{
  width:100%;height:100%;
  object-fit:contain;
}

/* 队名 */
.team .name{
  font-size:44px;font-weight:800;
  color:#fff;
  letter-spacing:3px;
  line-height:1.1;
  text-shadow:0 0 30px rgba(180,0,255,0.15);
}
.team .name small{
  font-size:16px;font-weight:400;
  color:rgba(255,255,255,0.35);
  display:block;margin-top:4px;
  letter-spacing:2px;
}
.team .stat{
  font-size:13px;
  color:rgba(255,255,255,0.3);
  margin-top:10px;
  letter-spacing:1px;
}

/* ========== VS 火焰特效 ========== */
.vs-wrap{
  position:relative;
  transform:translateZ(40px);
  z-index:20;
}

.vs{
  font-size:50px;font-weight:900;
  font-family:'Orbitron',sans-serif;
  letter-spacing:6px;
  position:relative;
  z-index:2;

  background:linear-gradient(
    180deg,
    #fff 0%,
    #cc88ff 20%,
    #aa44ff 45%,
    #8800ff 65%,
    #6600cc 80%,
    #440088 100%
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;

  filter:drop-shadow(0 0 10px rgba(170,68,255,0.6))
         drop-shadow(0 0 25px rgba(136,0,255,0.4))
         drop-shadow(0 0 50px rgba(100,0,200,0.2));
  animation:vsPulse 2s ease-in-out infinite;
}

/* 闪电 */
.lightning-1{
  position:absolute;
  top:-25px;left:-15px;
  font-size:30px;
  z-index:1;opacity:0.9;
  animation:flash1 1.8s ease-in-out infinite;
  filter:drop-shadow(0 0 8px rgba(200,150,255,0.8))
         drop-shadow(0 0 20px rgba(150,50,255,0.5));
}
.lightning-2{
  position:absolute;
  bottom:-22px;right:-12px;
  font-size:28px;
  z-index:1;opacity:0.8;
  animation:flash2 2.2s ease-in-out infinite;
  filter:drop-shadow(0 0 8px rgba(200,150,255,0.8))
         drop-shadow(0 0 20px rgba(150,50,255,0.5));
}

/* 火花粒子 */
.spark{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:#aa44ff;z-index:1;
  box-shadow:0 0 6px #9900ff,0 0 12px #7700cc;
}
.spark:nth-child(3){top:-8px;left:10px;animation:sparkFloat1 2.5s ease-in-out infinite;}
.spark:nth-child(4){bottom:0px;right:8px;animation:sparkFloat2 3s ease-in-out infinite 0.5s;}
.spark:nth-child(5){top:10px;right:-8px;animation:sparkFloat1 2.8s ease-in-out infinite 1s;}
.spark:nth-child(6){bottom:-5px;left:5px;animation:sparkFloat2 2.2s ease-in-out infinite 0.3s;}
.spark:nth-child(7){top:-3px;right:15px;width:4px;height:4px;animation:sparkFloat1 3.2s ease-in-out infinite 1.5s;}
.spark:nth-child(8){bottom:8px;left:-5px;width:5px;height:5px;animation:sparkFloat2 2.6s ease-in-out infinite 0.8s;}

@keyframes flash1{
  0%,100%{opacity:0.9;transform:scale(1) rotate(-15deg);}
  25%{opacity:1;transform:scale(1.15) rotate(-12deg);}
  50%{opacity:0.6;transform:scale(0.9) rotate(-18deg);}
  75%{opacity:1;transform:scale(1.1) rotate(-14deg);}
}
@keyframes flash2{
  0%,100%{opacity:0.8;transform:scale(1) rotate(15deg) scaleX(-1);}
  30%{opacity:1;transform:scale(1.2) rotate(12deg) scaleX(-1);}
  60%{opacity:0.5;transform:scale(0.85) rotate(18deg) scaleX(-1);}
  85%{opacity:1;transform:scale(1.1) rotate(14deg) scaleX(-1);}
}
@keyframes sparkFloat1{
  0%,100%{transform:translate(0,0) scale(1);opacity:0.8;}
  25%{transform:translate(8px,-12px) scale(1.3);opacity:1;}
  50%{transform:translate(-5px,-20px) scale(0.7);opacity:0.4;}
  75%{transform:translate(-10px,-8px) scale(1.1);opacity:0.7;}
}
@keyframes sparkFloat2{
  0%,100%{transform:translate(0,0) scale(1);opacity:0.7;}
  25%{transform:translate(-6px,10px) scale(1.2);opacity:1;}
  50%{transform:translate(8px,15px) scale(0.6);opacity:0.3;}
  75%{transform:translate(5px,5px) scale(1);opacity:0.6;}
}
@keyframes vsPulse{
  0%,100%{filter:drop-shadow(0 0 10px rgba(170,68,255,0.6)) drop-shadow(0 0 25px rgba(136,0,255,0.4)) drop-shadow(0 0 50px rgba(100,0,200,0.2));}
  50%{filter:drop-shadow(0 0 15px rgba(200,150,255,0.8)) drop-shadow(0 0 35px rgba(170,68,255,0.5)) drop-shadow(0 0 70px rgba(136,0,255,0.3));}
}

/* 底部栏 */
.bottombar{
  position:absolute;bottom:0;left:0;right:0;
  padding:14px 28px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;transform:translateZ(20px);
  border-top:1px solid rgba(180,0,255,0.1);
}
.bottombar .info{font-size:12px;color:rgba(180,0,255,0.35);letter-spacing:1.5px;}
.bottombar .info strong{color:rgba(180,0,255,0.5);}
.bottombar .brand{
  font-size:12px;color:rgba(180,0,255,0.25);
  letter-spacing:2.5px;font-family:'Orbitron',sans-serif;
}

/* 光晕 */
.glow-bar{
  position:absolute;bottom:0;left:10%;right:10%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(180,0,255,0.15),transparent);
  z-index:1;
}
.glow-top{
  position:absolute;top:0;left:15%;right:15%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(180,0,255,0.1),transparent);
  z-index:1;
}
.vignette-left{
  position:absolute;top:0;left:0;bottom:0;width:120px;
  background:linear-gradient(90deg,rgba(180,0,255,0.04),transparent);
  z-index:1;
}
.vignette-right{
  position:absolute;top:0;right:0;bottom:0;width:120px;
  background:linear-gradient(270deg,rgba(180,0,255,0.04),transparent);
  z-index:1;
}
.center-glow{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(180,0,255,0.04),transparent 70%);
  z-index:0;
}
</style>
</head>
<body>

<div class="card">
  <div class="bg-layer"></div>

  <div class="mid-layer">
    <div class="mid-ring"></div>
    <div class="mid-ring2"></div>
  </div>

  <div class="glow-top"></div>
  <div class="vignette-left"></div>
  <div class="vignette-right"></div>
  <div class="center-glow"></div>

  <div class="topbar">
    <div class="tag">J1 LEAGUE <span>WEST</span></div>
    <div class="tag">RD 15 · 西区</div>
  </div>

  <div class="vs-container">
    <div class="team team-left">
      <div class="badge">
        <!-- 广岛三箭 SVG 队徽（三箭紫盾） -->
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hpurple" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#7c3aed"/>
              <stop offset="100%" stop-color="#4c1d95"/>
            </linearGradient>
          </defs>
          <!-- 盾牌 -->
          <path d="M60 5 L110 25 L110 65 Q110 95 60 115 Q10 95 10 65 L10 25 Z" fill="url(#hpurple)" stroke="#9d9d9c" stroke-width="1.5"/>
          <path d="M60 12 L103 29 L103 63 Q103 90 60 108 Q17 90 17 63 L17 29 Z" fill="#2d0a4e" stroke="#c09949" stroke-width="1"/>
          <!-- 三箭 -->
          <g stroke="#c09949" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <!-- 左箭 -->
            <path d="M45 50 L30 75 L40 72 L38 82 L48 74" stroke-dasharray="0"/>
            <!-- 中箭 -->
            <path d="M60 40 L55 80 L62 78 L60 88 L67 76"/>
            <!-- 右箭 -->
            <path d="M75 50 L90 75 L80 72 L82 82 L72 74" stroke-dasharray="0"/>
          </g>
          <!-- 箭头装饰 -->
          <circle cx="60" cy="55" r="8" fill="none" stroke="#c09949" stroke-width="1.5"/>
          <circle cx="60" cy="55" r="4" fill="#c09949"/>
          <!-- 星 -->
          <text x="60" y="30" text-anchor="middle" fill="#c09949" font-size="10">★</text>
        </svg>
      </div>
      <div class="name">广岛三箭<small>SANFRECCE</small></div>
      <div class="stat">西区第5 · 主场5胜2负</div>
    </div>

    <div class="vs-wrap">
      <div class="lightning-1">⚡</div>
      <div class="lightning-2">⚡</div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="vs">VS</div>
    </div>

    <div class="team team-right">
      <div class="badge">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/9f/Vissel_Kobe_%28logo%29.svg" alt="Vissel Kobe">
      </div>
      <div class="name">神户胜利船<small>VISSEL KOBE</small></div>
      <div class="stat">西区榜首 · 卫冕冠军</div>
    </div>
  </div>

  <div class="bottombar">
    <div class="info"><strong>首回合</strong> 神户 2-1 广岛</div>
    <div class="info"><strong>05.06</strong> 14:00 · EDION和平翼</div>
    <div class="brand">阿飞·赛博聊球</div>
  </div>

  <div class="glow-bar"></div>
</div>

</body>
</html>
